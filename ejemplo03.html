<!DOCTYPE html>
<html lang="es-PE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* unvisited link */
    a:link {
      color: green;
    }
    /* visited link */
    a:visited {
      color: green;
    }
    /* mouse over link */
    a:hover {
      color: red;
    }
    /* selected link */
    a:active {
      color: yellow;
    }
  </style>
</head>
<body>
  <p>Coloca el cursor sobre el enlace y haz clic en él: <a href="https://www.iestpmonfortianos.edu.pe">iestpmonfortianos.edu.pe</a></p>
</body>
</html>
